  <script>
    let opened = false;
    let candleLit = false;
    const messages = JSON.parse(`["As it\u0027s your Birthday A very special day for me as well cuz you were born into this world and brought into my life. you have made my life even more beautiful with your goddess like presence May you keep smiling forever and ever. You know I HATE YOU A LOT RIGHT!!!"]`);

    // Create Twinkling Stars
    function initStars() {
      const container = document.getElementById('star-container');
      const count = 100;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star animate-twinkle';
        const size = Math.random() * 3 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.animationDelay = `${Math.random() * 3}s`;
        container.appendChild(star);
      }
    }

    initStars();

    function startCelebration() {
      if (opened) return;
      opened = true;

      const revealScreen = document.getElementById('reveal-screen');
      const mainContent = document.getElementById('main-content');
      const bgMusic = document.getElementById('bg-music');

      // GSAP Reveal Animation
      gsap.to(revealScreen, {
        y: -window.innerHeight,
        duration: 1.2,
        ease: "power4.inOut",
        onComplete: () => {
          revealScreen.style.display = 'none';
          mainContent.classList.remove('hidden');
          
          gsap.to(mainContent, {
            opacity: 1,
            y: 0,
            duration: 1,
            ease: "back.out(1.7)",
            onComplete: () => {
              startTyping();
              launchInitialConfetti();
              playMusic();
            }
          });
        }
      });
    }

    function startTyping() {
      new Typed('#typed-text', {
        strings: messages,
        typeSpeed: 60,
        backSpeed: 40,
        backDelay: 2500,
        loop: true,
        showCursor: true,
        cursorChar: '_'
      });
    }

    function playMusic() {
      const bgMusic = document.getElementById('bg-music');
      const spotify = document.getElementById('spotify-player');
      
      if (bgMusic) {
        bgMusic.volume = 0.5;
        bgMusic.play().catch(() => console.log("Audio blocked"));
      }
      if (spotify) {
        spotify.classList.remove('translate-y-40');
      }
    }

    function toggleSpotify() {
        const s = document.getElementById('spotify-player');
        s.classList.toggle('translate-y-40');
    }

    // Interactive Functions
    function handleCandle() {
      const flame = document.getElementById('main-flame');
      const cake = document.getElementById('cake-body');
      
      if (!candleLit) {
        // Light it
        flame.style.display = 'block';
        gsap.from(flame, { scale: 0, duration: 0.3, ease: "back.out" });
        candleLit = true;
        showToast("Candle Lit! Now blow it out! 🌬️");
      } else {
        // Blow it out
        flame.style.display = 'none';
        candleLit = false;
        launchConfetti(0.5); // Mini confetti
        gsap.to(cake, { y: 5, duration: 0.1, yoyo: true, repeat: 3 });
        showToast("Happy Birthday! 🎉");
      }
    }

    function makeAWish() {
      launchConfetti(1);
      gsap.to('#main-content', { scale: 1.02, duration: 0.1, yoyo: true, repeat: 1 });
    }

    function sendLove() {
      for (let i = 0; i < 15; i++) {
        setTimeout(createHeart, i * 100);
      }
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart-particle text-2xl';
      heart.innerHTML = '❤️';
      heart.style.left = `${Math.random() * 80 + 10}%`;
      heart.style.bottom = '0';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 2000);
    }

    function launchInitialConfetti() {
        launchConfetti(1.5);
    }

    function launchConfetti(scale = 1) {
      const duration = 2000 * scale;
      const end = Date.now() + duration;

      const interval = setInterval(() => {
        if (Date.now() > end) {
          clearInterval(interval);
          return;
        }
        confetti({
          particleCount: 15,
          angle: 60,
          spread: 55,
          origin: { x: 0 },
          colors: ['#f43f5e', '#6366f1']
        });
        confetti({
          particleCount: 15,
          angle: 120,
          spread: 55,
          origin: { x: 1 },
          colors: ['#f43f5e', '#6366f1']
        });
      }, 250);
    }

    function showToast(text) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-full text-white font-bold z-[300] transition-all duration-500 translate-y-10 opacity-0';
        toast.innerHTML = text;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.classList.remove('translate-y-10', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 2000);
        }, 50);
    }
function showGift(){

    alert("🎉 Congratulations!\n\nYou can have a big hug with me with lots n lots of kisses! 🤗❤️");

    document.getElementById("main-content").style.display="none";

    document.getElementById("giftPage").style.display="flex";

    document.getElementById("hugGif").src="hug-hugs.gif";

}

function closeGift(){

    document.getElementById("giftPage").style.display="none";

    document.getElementById("main-content").style.display="block";

}
